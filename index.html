let audioCtx=null;let _muted=false;
function getAudio(){if(_muted)return null;if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==="suspended")audioCtx.resume();return audioCtx}

function playShoot(big){try{const c=getAudio();if(!c)return;const t=c.currentTime;
  const o=c.createOscillator(),g=c.createGain(),f=c.createBiquadFilter();
  o.type="sawtooth";o.frequency.setValueAtTime(big?200:400,t);o.frequency.exponentialRampToValueAtTime(big?60:100,t+0.12);
  g.gain.setValueAtTime(big?0.15:0.1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
  f.type="lowpass";f.frequency.setValueAtTime(big?2000:4000,t);f.frequency.exponentialRampToValueAtTime(200,t+0.12);
  o.connect(f);f.connect(g);g.connect(c.destination);o.start(t);o.stop(t+0.15);
  // Noise burst for punch
  const buf=c.createBuffer(1,c.sampleRate*0.06,c.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
  const n=c.createBufferSource(),ng=c.createGain();n.buffer=buf;ng.gain.setValueAtTime(big?0.12:0.06,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.06);
  n.connect(ng);ng.connect(c.destination);n.start(t);
}catch{}}

function playHit(){try{const c=getAudio();if(!c)return;const t=c.currentTime;
  const buf=c.createBuffer(1,c.sampleRate*0.08,c.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3);
  const n=c.createBufferSource(),g=c.createGain(),f=c.createBiquadFilter();
  n.buffer=buf;g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.08);
  f.type="bandpass";f.frequency.value=2000;f.Q.value=1;
  n.connect(f);f.connect(g);g.connect(c.destination);n.start(t);
}catch{}}

function playExplosion(big){try{const c=getAudio();if(!c)return;const t=c.currentTime;
  // Low boom
  const o=c.createOscillator(),g=c.createGain();
  o.type="sine";o.frequency.setValueAtTime(big?80:120,t);o.frequency.exponentialRampToValueAtTime(big?20:30,t+(big?0.6:0.4));
  g.gain.setValueAtTime(big?0.25:0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+(big?0.6:0.4));
  o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+(big?0.7:0.5));
  // Noise crunch
  const len=big?0.4:0.25;
  const buf=c.createBuffer(1,c.sampleRate*len,c.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++){const env=Math.pow(1-i/d.length,big?1.5:2);d[i]=(Math.random()*2-1)*env}
  const n=c.createBufferSource(),ng=c.createGain(),f=c.createBiquadFilter();
  n.buffer=buf;ng.gain.setValueAtTime(big?0.2:0.12,t);ng.gain.exponentialRampToValueAtTime(0.001,t+len);
  f.type="lowpass";f.frequency.setValueAtTime(big?3000:2000,t);f.frequency.exponentialRampToValueAtTime(100,t+len);
  n.connect(f);f.connect(ng);ng.connect(c.destination);n.start(t);
  // Mid crack
  const o2=c.createOscillator(),g2=c.createGain();
  o2.type="square";o2.frequency.setValueAtTime(big?250:350,t);o2.frequency.exponentialRampToValueAtTime(50,t+0.15);
  g2.gain.setValueAtTime(big?0.08:0.05,t);g2.gain.exponentialRampToValueAtTime(0.001,t+0.15);
  o2.connect(g2);g2.connect(c.destination);o2.start(t);o2.stop(t+0.2);
}catch{}}

function playJump(){try{const c=getAudio();if(!c)return;const t=c.currentTime;

}catch{}}

function playDeath(){try{const c=getAudio();if(!c)return;const t=c.currentTime;

  const o=c.createOscillator(),g=c.createGain();
  o.type="sawtooth";o.frequency.setValueAtTime(500,t);o.frequency.exponentialRampToValueAtTime(80,t+0.5);
  g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.5);

  const n=c.createBufferSource(),ng=c.createGain();n.buffer=buf;ng.gain.setValueAtTime(0.06,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.3);
  n.connect(ng);ng.connect(c.destination);n.start(t);
}catch{}}

function playPickup(){try{const c=getAudio();if(!c)return;const t=c.currentTime;
  const notes=[523,659,784]; // C E G arpeggio
  notes.forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();
    o.type="sine";o.frequency.value=f;g.gain.setValueAtTime(0.06,t+i*0.06);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.06+0.12);
    o.connect(g);g.connect(c.destination);o.start(t+i*0.06);o.stop(t+i*0.06+0.15)});
}catch{}}

function playGlass(){try{const c=getAudio();if(!c)return;const t=c.currentTime;

  [2000,3200,4800].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();

}catch{}}

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]]}return b}
function rI(a,b){return a+((Math.random()*(b-a))|0)}
function dist(a,b,c,d){return Math.hypot(a-c,b-d)}

function genLevel(th){
  const plats=[{x:0,y:GND,w:W,h:40,label:th.tb.l,textCol:th.tb.t,isTB:true}];
  const labs=shuffle(th.pL);
  const zones=[{x1:30,x2:280,y1:380,y2:440},{x1:300,x2:520,y1:320,y2:380},{x1:540,x2:740,y1:360,y2:430},{x1:50,x2:300,y1:220,y2:280},{x1:350,x2:600,y1:180,y2:240},{x1:0,x2:200,y1:100,y2:160},{x1:250,x2:540,y1:70,y2:120},{x1:560,x2:760,y1:120,y2:180}];
  const uz=shuffle(zones).slice(0,7+rI(0,2));
  uz.forEach((z,i)=>{const pw=rI(130,220),px=rI(z.x1,Math.max(z.x1+10,z.x2-pw));plats.push({x:Math.max(0,Math.min(W-pw,px)),y:rI(z.y1,z.y2),w:pw,h:28,label:labs[i%labs.length]})});
  const wins=[];for(let i=0,n=rI(2,5);i<n;i++){const ww=rI(200,310),wh=rI(120,200);wins.push({x:rI(20,W-ww-20),y:rI(30,H-wh-120),w:ww,h:wh,title:th.wT[i%th.wT.length],bT:th.wB[i%th.wB.length],hp:WINDOW_HP,alive:true,sx:0,sy:0,cracks:[]})}
  const barrels=[];shuffle(plats.slice(1)).slice(0,rI(5,9)).forEach((p,i)=>{barrels.push({x:p.x+rI(10,Math.max(12,p.w-30)),y:p.y-36,w:24,h:36,hp:BARREL_HP,alive:true,id:i,fl:0})});
  const icons=shuffle(th.ic).slice(0,rI(3,5)).map((ic,i)=>({...ic,x:i%2===0?rI(15,50):rI(710,745),y:25+i*65}));
  return{plats,wins,barrels,icons};
}

// ══════ DRAW STICKMAN ══════
function drawStickman(ctx,p,col,th,t,teamMode){
  const cx=p.x+PW/2, baseY=p.y;
  const dir=p.fr?1:-1;
  const running=Math.abs(p.vx)>1;
  const shooting=p.mf>0;
  
  ctx.save();
  // Hit flash — whole body flashes white
  if(p.hf>0){ctx.shadowColor="#ff0000";ctx.shadowBlur=20}
  const bodyCol=p.hf>0?(p.hf%2===0?"#fff":"#ff4444"):col;
  
  // Squash/stretch on landing
  const sy=p.squash;const sx=2-sy;
  ctx.translate(cx,baseY+PH);
  ctx.scale(sx,sy);
  ctx.translate(-cx,-(baseY+PH));
  
  // Body tilt when running
  ctx.translate(cx,baseY+PH);
  ctx.rotate(p.bodyTilt);
  ctx.translate(-cx,-(baseY+PH));
  
  ctx.strokeStyle=bodyCol;
  ctx.lineWidth=3;
  ctx.lineCap="round";
  ctx.lineJoin="round";
  
  // ── HEAD ──
  const headY=baseY+8;
  const headR=8;
  ctx.beginPath();ctx.arc(cx,headY,headR,0,Math.PI*2);ctx.stroke();
  
  // Eyes (small dots facing direction)
  ctx.fillStyle=bodyCol;
  const eyeX=cx+dir*3;
  ctx.fillRect(eyeX-1,headY-2,2,2);
  ctx.fillRect(eyeX+dir*3-1,headY-2,2,2);
  
  // Mouth — determined by state
  if(shooting){
    // Open mouth when shooting
    ctx.beginPath();ctx.arc(cx+dir*3,headY+3,2,0,Math.PI);ctx.stroke();
  }
  
  // ── BODY ──
  const shoulderY=baseY+18;
  const hipY=baseY+34;
  ctx.beginPath();ctx.moveTo(cx,baseY+16);ctx.lineTo(cx,hipY);ctx.stroke();
  
  // ── LEGS (animated run cycle) ──
  const legLen=14;
  if(running){
    const phase=p.runCycle;
    // Front leg
    const fKneeAngle=Math.sin(phase)*0.6;
    const fFootAngle=Math.sin(phase)*0.4;
    const knee1X=cx+Math.sin(fKneeAngle)*8;
    const knee1Y=hipY+legLen*0.6;
    const foot1X=knee1X+Math.sin(fFootAngle)*6;
    const foot1Y=hipY+legLen;
    ctx.beginPath();ctx.moveTo(cx,hipY);ctx.lineTo(knee1X,knee1Y);ctx.lineTo(foot1X,foot1Y);ctx.stroke();
    // Back leg
    const bKneeAngle=Math.sin(phase+Math.PI)*0.6;
    const bFootAngle=Math.sin(phase+Math.PI)*0.4;
    const knee2X=cx+Math.sin(bKneeAngle)*8;
    const knee2Y=hipY+legLen*0.6;
    const foot2X=knee2X+Math.sin(bFootAngle)*6;
    const foot2Y=hipY+legLen;
    ctx.beginPath();ctx.moveTo(cx,hipY);ctx.lineTo(knee2X,knee2Y);ctx.lineTo(foot2X,foot2Y);ctx.stroke();
  } else if(!p.og){
    // In air — legs tucked or spread
    const tuck=p.vy<0?0.3:-0.2;
    ctx.beginPath();ctx.moveTo(cx,hipY);ctx.lineTo(cx-8,hipY+legLen*Math.cos(tuck));ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx,hipY);ctx.lineTo(cx+8,hipY+legLen*Math.cos(tuck));ctx.stroke();
  } else {
    // Idle — slight stance
    ctx.beginPath();ctx.moveTo(cx,hipY);ctx.lineTo(cx-6,hipY+legLen);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx,hipY);ctx.lineTo(cx+6,hipY+legLen);ctx.stroke();
  }
  
  // ── ARMS ──
  // Back arm (non-gun, swings when running)
  const backArmSwing=running?Math.sin(p.runCycle+Math.PI)*0.5:0;
  ctx.lineWidth=2.5;
  ctx.beginPath();
  ctx.moveTo(cx,shoulderY);
  ctx.lineTo(cx-dir*10,shoulderY+8+Math.sin(backArmSwing)*6);
  ctx.stroke();
  
  // Gun arm — points forward with recoil
  ctx.lineWidth=3;
  const armRecoil=p.armAngle;
  const gunArmEndX=cx+dir*14;
  const gunArmEndY=shoulderY+2-armRecoil*2;
  ctx.beginPath();
  ctx.moveTo(cx,shoulderY);
  ctx.lineTo(gunArmEndX,gunArmEndY);
  ctx.stroke();
  
  // ── GUN ──
  ctx.strokeStyle="#999";
  ctx.lineWidth=3.5;
  const gunStartX=gunArmEndX;
  const gunStartY=gunArmEndY;
  const gunEndX=gunStartX+dir*(GL-armRecoil*4);
  const gunEndY=gunStartY-armRecoil;
  ctx.beginPath();ctx.moveTo(gunStartX,gunStartY);ctx.lineTo(gunEndX,gunEndY);ctx.stroke();
  
  // Gun detail — grip
  ctx.strokeStyle="#777";
  ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(gunStartX+dir*3,gunStartY);ctx.lineTo(gunStartX+dir*3,gunStartY+5);ctx.stroke();
  
  // Muzzle flash
  if(p.mf>0){
    const mfx=gunEndX+dir*2,mfy=gunEndY;
    ctx.fillStyle=`rgba(255,200,50,${p.mf/4})`;
    ctx.beginPath();ctx.arc(mfx,mfy,5+p.mf*3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(255,255,200,${p.mf/6})`;
    ctx.beginPath();ctx.arc(mfx,mfy,2+p.mf,0,Math.PI*2);ctx.fill();
  }
  
  ctx.restore();
  
  // ── POWERUP AURA ──
  if(p.pu){
    const pc=p.pu==="rapidfire"?"#ffaa00":p.pu==="bigshots"?"#ff4488":"#44aaff";
    ctx.strokeStyle=pc;ctx.lineWidth=1.5;
    ctx.globalAlpha=0.25+Math.sin(t*0.15)*0.15;
    ctx.beginPath();ctx.arc(cx,baseY+PH/2,PW+6,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
  }
  
  // ── NAME + HP ──
  ctx.fillStyle=col;ctx.font=`bold 9px ${th.ft}`;ctx.textAlign="center";
  const nameStr=teamMode?`${PNAMES[p.id]}·${TNAMES[p.team]}`:PNAMES[p.id];
  ctx.fillText(nameStr,cx,baseY-10);
  const hbW=30,hbX=cx-hbW/2,hbY=baseY-5;
  ctx.fillStyle="rgba(0,0,0,0.5)";ctx.fillRect(hbX,hbY,hbW,4);
  const hpP=Math.max(0,p.hp/MAXHP);
  ctx.fillStyle=hpP>0.5?"#44ff88":hpP>0.25?"#ffaa44":"#ff4444";
  ctx.fillRect(hbX,hbY,hbW*hpP,4);
  ctx.textAlign="left";
}

// Draw death ragdoll
function drawDeathStick(ctx,p,col){
  if(!p.showDeath)return;
  const a=p.deathTimer/60;if(a<=0)return;
  ctx.save();
  ctx.globalAlpha=a;
  ctx.translate(p.deathX,p.deathY);
  ctx.rotate(p.deathRot);
  ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.lineCap="round";
  // Ragdoll stickman
  ctx.beginPath();ctx.arc(0,-16,6,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-10);ctx.lineTo(0,6);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-6);ctx.lineTo(-10,-2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-6);ctx.lineTo(10,2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,6);ctx.lineTo(-8,16);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,6);ctx.lineTo(8,14);ctx.stroke();
  ctx.restore();
}

function DesktopDestroyer(){

    g.sys32T++;if(!g.sys32pu&&g.sys32T>800&&Math.random()<0.008&&g.plats.length>1){const pl=g.plats[1+0|Math.random()*(g.plats.length-1)];g.sys32pu={x:pl.x+pl.w/2-10,y:pl.y-22,w:20,h:20,bob:0,life:500};g.sys32T=0}

      // Powerup pickup

          else{p.pu=pu.effect;p.puT=300;playPickup();g.dmg.push({x:p.x+PW/2,y:p.y-20,text:pu.label,life:40,color:pu.color})}
          for(let k=0;k<10;k++){const pp=mkSpark(pu.x+8,pu.y+8,"spark",th.pc);pp.color=pu.color;g.particles.push(pp)}
          g.pups.splice(j,1)}}
      if(p.mf>0)p.mf--;if(p.hf>0)p.hf--}
    // Bullets
    for(let i=g.bullets.length-1;i>=0;i--){const b=g.bullets[i];b.trail.push({x:b.x,y:b.y});if(b.trail.length>6)b.trail.shift();b.x+=b.vx;b.y+=b.vy;b.life--;let hit=false;

          </div>
          {sTm&&<div style={{fontSize:"9px",color:"rgba(255,255,255,0.3)"}}><span style={{color:TCOLS[0]}}>BLUE</span> P1{sNp>=3?"+P3":""} vs <span style={{color:TCOLS[1]}}>RED</span> P2{sNp>=4?"+P4":""} · No friendly fire</div>}
          <div style={{color:"rgba(255,255,255,0.5)",fontSize:"11px",fontWeight:700}}>FIRST TO</div>
          <div style={{display:"flex",gap:"6px"}}>{[5,10,15,20].map(k=><button key={k} onClick={()=>setSKt(k)} style={{background:sKt===k?"rgba(255,100,50,0.2)":"transparent",color:sKt===k?"#ff8855":"#777",border:`2px solid ${sKt===k?"rgba(255,100,50,0.4)":"rgba(255,255,255,0.1)"}`,borderRadius:"6px",padding:"6px 14px",fontSize:"13px",fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>{k}</button>)}</div>
          {/* Controls */}
          <div style={{display:"flex",flexDirection:"column",gap:"4px",width:"100%",marginTop:"4px"}}>
            {Array.from({length:sNp}).map((_,i)=>{const c=CTRL[i].lb;const col=sTm?TCOLS[i%2]:PCOLS[i];return(
              <div key={i} style={{display:"flex",alignItems:"center",gap:"5px",padding:"4px 8px",background:"rgba(0,0,0,0.3)",borderRadius:"4px",fontSize:"10px"}}>
                <span style={{color:col,fontWeight:800,width:"20px"}}>{PNAMES[i]}</span>
                {sTm&&<span style={{color:TCOLS[i%2],fontSize:"8px",width:"30px"}}>{TNAMES[i%2]}</span>}
                <K>{c.l}</K><K>{c.r}</K><span style={{color:"#445",fontSize:"8px"}}>move</span>
                <K>{c.u}</K><span style={{color:"#445",fontSize:"8px"}}>jump</span>
                <K accent>{c.s}</K><span style={{color:"#ff8855",fontSize:"9px",fontWeight:700}}>🔫 SHOOT</span>
              </div>)})}
          </div>
          <button onClick={()=>startGame(sNp,themeIdx,sTm,sKt)} style={{marginTop:"4px",background:"linear-gradient(135deg,rgba(255,100,50,0.2),rgba(255,50,50,0.15))",color:"#fff",border:"2px solid rgba(255,100,50,0.4)",borderRadius:"8px",padding:"10px 36px",fontSize:"15px",fontWeight:800,cursor:"pointer",fontFamily:"inherit",letterSpacing:"2px"}}
            onMouseOver={e=>e.target.style.transform="scale(1.05)"} onMouseOut={e=>e.target.style.transform="scale(1)"}>⚡ FIGHT ⚡</button>
          <button onClick={()=>setPhase("theme")} style={{background:"transparent",color:"rgba(255,255,255,0.2)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"4px",padding:"3px 10px",fontSize:"9px",cursor:"pointer",fontFamily:"inherit"}}>← CHANGE OS</button>
        </div>
      </div>);
  }

  // ── GAME ──
  const th=OS[themeIdx];
  const tsc=tm?[0,0]:null;if(tm)G.current.players.forEach(p=>{tsc[p.team]+=p.score});
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100%",background:`linear-gradient(145deg,${th.bg1},${th.bg2})`,fontFamily:"'JetBrains Mono',monospace",padding:"8px",boxSizing:"border-box"}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');`}</style>
      <div style={{display:"flex",alignItems:"baseline",gap:"10px",marginBottom:"3px"}}>
        <span style={{fontSize:"16px",fontWeight:800,color:"#fff",letterSpacing:"2px",textShadow:"0 0 10px rgba(255,100,50,0.3)"}}>⚡ DESKTOP DESTROYER</span>
        <span style={{fontSize:"10px",color:"rgba(255,255,255,0.2)"}}>{th.emoji} {th.name}</span>
        <span style={{fontSize:"10px",color:"rgba(255,100,50,0.35)",fontWeight:700}}>First to {kt}</span>
      </div>
      <div style={{display:"flex",gap:"10px",marginBottom:"3px"}}>
        {tm?TNAMES.map((tn,t)=>(
          <div key={t} style={{display:"flex",alignItems:"center",gap:"6px",padding:"2px 12px",background:"rgba(0,0,0,0.35)",borderRadius:"4px",border:`1px solid ${TCOLS[t]}44`}}>
            <div style={{width:"8px",height:"8px",borderRadius:"50%",background:TCOLS[t],boxShadow:`0 0 8px ${TCOLS[t]}88`}}/>
            <span style={{color:TCOLS[t],fontWeight:700,fontSize:"11px"}}>{tn}</span>
            <span style={{color:"#fff",fontWeight:800,fontSize:"15px"}}>{tsc[t]}</span>
            <span style={{color:"rgba(255,255,255,0.15)",fontSize:"9px"}}>/{kt}</span>
          </div>)):
        Array.from({length:np}).map((_,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:"5px",padding:"2px 8px",background:"rgba(0,0,0,0.3)",borderRadius:"4px",border:`1px solid ${PCOLS[i]}33`}}>
            <div style={{width:"7px",height:"7px",borderRadius:"50%",background:PCOLS[i]}}/>
            <span style={{color:PCOLS[i],fontWeight:700,fontSize:"10px"}}>{PNAMES[i]}</span>
            <span style={{color:"#fff",fontWeight:800,fontSize:"13px"}}>{scores[i]}</span>
            <span style={{color:"rgba(255,255,255,0.15)",fontSize:"8px"}}>/{kt}</span>
          </div>))}
      </div>
      <div style={{position:"relative",borderRadius:"6px",overflow:"hidden",border:`2px solid ${th.pB}`,boxShadow:"0 0 30px rgba(0,0,0,0.5)"}}>
        <canvas ref={cvRef} width={W} height={H} style={{display:"block"}}/>
        {th.crt&&<div style={{position:"absolute",inset:0,pointerEvents:"none",background:"repeating-linear-gradient(0deg,rgba(0,0,0,0.06) 0px,rgba(0,0,0,0.06) 1px,transparent 1px,transparent 3px)"}}/>}
      </div>
      <CtrlBar/>
      <div style={{display:"flex",gap:"8px",marginTop:"6px"}}>
        <button onClick={()=>{G.current.started=false;setPhase("theme");setMo(false)}} style={{background:"rgba(255,255,255,0.06)",color:"rgba(255,255,255,0.5)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:"5px",padding:"6px 14px",fontSize:"11px",cursor:"pointer",fontFamily:"inherit",fontWeight:600,letterSpacing:"0.5px"}}>MENU</button>
        <button onClick={()=>startGame(np,themeIdx,tm,kt)} style={{background:"rgba(255,100,50,0.15)",color:"#ff9966",border:"1px solid rgba(255,100,50,0.3)",borderRadius:"5px",padding:"6px 14px",fontSize:"11px",cursor:"pointer",fontFamily:"inherit",fontWeight:700,letterSpacing:"0.5px"}}>🔄 NEW MAP</button>
        <button onClick={()=>startGame(np,themeIdx,tm,kt)} style={{background:"rgba(255,255,255,0.06)",color:"rgba(255,255,255,0.5)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:"5px",padding:"6px 14px",fontSize:"11px",cursor:"pointer",fontFamily:"inherit",fontWeight:600,letterSpacing:"0.5px"}}>REMATCH</button>
        <button onClick={()=>{_muted=!_muted;setMuted(!muted)}} style={{background:muted?"rgba(255,50,50,0.2)":"rgba(255,255,255,0.06)",color:muted?"#ff8888":"rgba(255,255,255,0.5)",border:`1px solid ${muted?"rgba(255,80,80,0.35)":"rgba(255,255,255,0.15)"}`,borderRadius:"5px",padding:"6px 14px",fontSize:"11px",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>{muted?"🔇 MUTED":"🔊 SOUND"}</button>
      </div>
    </div>);
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(DesktopDestroyer));
</script>
</body>
</html>
